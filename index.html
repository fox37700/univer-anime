<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Univer-Anime</title>
</head>
<body>

    <header>
        <img src="Gemini_Generated_Image_5ymtpw5ymtpw5ymt.png" alt="Logo Univer-Anime" width="300">
        
        <div class="recherche-container">
            <input type="text" id="barre-recherche" placeholder="Rechercher un anime...">
            <button>Rechercher</button>
        </div>
        
        <div>
            <a href="#" class="btn-auth">S'inscrire</a>

    <section class="hero-banner">
        <h1>Titre de l'Anime du Moment</h1>

    <section class="section-container">
        <h2>Catalogue complet</h2>
        <div class="grille" id="catalogue-complet">
            <div class="carte"><img src="https://via.placeholder.com/150" alt="Anime"><p>Anime 1</p></div>
            <div class="carte"><img src="https://via.placeholder.com/150" alt="Anime"><p>Anime 2</p></div>
            <div class="carte"><img src="https://via.placeholder.com/150" alt="Anime"><p>Anime 3</p></div>
        </div>
    </section>

    <section class="section-container">
        <h2>Récents et populaires</h2>
        <div class="grille" id="recents-populaires">
            <div class="carte"><img src="https://via.placeholder.com/150" alt="Anime"><p>Anime 1</p></div>
            <div class="carte"><img src="https://via.placeholder.com/150" alt="Anime"><p>Anime 2</p></div>
        </div>
    </section>

</body>
</html>
