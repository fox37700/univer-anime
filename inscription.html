<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Inscription - Univer-Anime</title>
</head>
<body style="background-color: #0a0e14; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: Arial, sans-serif;">

    <div style="background-color: #1a202c; padding: 30px; border-radius: 10px; width: 300px; text-align: center;">
        <h2 style="color: #2ecc71;">S'inscrire</h2>
        <form>
            <input type="text" placeholder="Nom d'utilisateur" style="width: 100%; margin-bottom: 15px; padding: 10px; border-radius: 5px; border: none; box-sizing: border-box;">
            <input type="email" placeholder="Email" style="width: 100%; margin-bottom: 15px; padding: 10px; border-radius: 5px; border: none; box-sizing: border-box;">
            <input type="password" placeholder="Mot de passe" style="width: 100%; margin-bottom: 20px; padding: 10px; border-radius: 5px; border: none; box-sizing: border-box;">
            <button style="width: 100%; padding: 10px; background-color: #2ecc71; border: none; color: white; cursor: pointer; border-radius: 5px; font-weight: bold;">Valider</button>
        </form>
        <p style="font-size: 0.8rem; margin-top: 15px;">Déjà inscrit ? <a href="index.html" style="color: #2ecc71; text-decoration: none;">Retour à l'accueil</a></p>
    </div>

</body>
</html>
